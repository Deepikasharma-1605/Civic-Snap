
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSnap - Smart Civic Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        .bg-charcoal { background-color: #0a0a0a; }
        .text-amber { color: #f59e0b; }
        .bg-amber { background-color: #f59e0b; }
        .border-amber { border-color: #f59e0b; }
        
        /* Reveal Animation Base */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 3D Depth Classes */
        .perspective-1000 {
            perspective: 1000px;
        }
        .card-3d {
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s ease;
            transform-style: preserve-3d;
        }
        .card-3d:hover {
            transform: rotateX(4deg) rotateY(-4deg) translateY(-10px);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5), -5px -5px 20px rgba(245,158,11,0.05);
        }

        /* Smooth Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f59e0b;
        }

        /* Custom Gradients */
        .glow-mesh {
            background-image: radial-gradient(at 0% 0%, hsla(38, 92%, 50%, 0.05) 0, transparent 50%),
                              radial-gradient(at 100% 100%, hsla(210, 100%, 50%, 0.05) 0, transparent 50%);
        }
    </style>

<body class="glow-mesh">
    <div id="root"></div>
    <script>
        // Simple Intersection Observer for scroll reveals
        const observerOptions = {
            threshold: 0.1
        };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        // Re-run observer when DOM changes (for React transitions)
        const observeElements = () => {
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        };
        
        const mutationObserver = new MutationObserver(observeElements);
        mutationObserver.observe(document.body, { childList: true, subtree: true });
        observeElements();
    </script>
</body>
